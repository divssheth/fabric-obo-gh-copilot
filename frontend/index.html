<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Data Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Fabric Data Chat</h1>
            <div id="auth-section">
                <button id="login-btn" onclick="login()">Sign in with Microsoft</button>
                <span id="user-name" class="hidden"></span>
                <button id="logout-btn" class="hidden" onclick="logout()">Sign out</button>
            </div>
        </header>

        <div id="chat-window">
            <div id="messages"></div>
        </div>

        <div id="input-section" class="hidden">
            <input type="text" id="message-input" placeholder="Ask a question about your data..." onkeydown="handleKeydown(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
